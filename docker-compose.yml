services:
  # Redis para armazenamento de histórico de conversa.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Ollama rodando dentro do próprio compose.
  # Este arquivo base funciona em CPU e pode ser combinado com um override de GPU.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # Healthcheck para garantir que a API do Ollama esta pronta para receber requisicoes.
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Servico de inicializacao: baixa o modelo uma vez e encerra com sucesso.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "ollama:11434"
      # Usa o mesmo modelo configurado para a API.
      OLLAMA_MODEL: "${OLLAMA_MODEL:-gemma3:4b}"
    volumes:
      - ollama_data:/root/.ollama
    # A imagem ja possui entrypoint `ollama`; aqui passamos apenas o subcomando.
    command: ["pull", "${OLLAMA_MODEL:-gemma3:4b}"]

  # API Fastify com Ollama real como padrao.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${PORT_API:-3001}:${PORT_API:-3001}"
    environment:
      PORT_API: "${PORT_API:-3001}"
      HOST: "0.0.0.0"
      # Configuracao do adaptador Ollama (OpenAI-compatible API).
      OLLAMA_BASE_URL: "http://ollama:11434/v1"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-gemma3:4b}"
      OLLAMA_API_KEY: "ollama"
      # Redis para histórico de conversa.
      REDIS_URL: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

  # Frontend React/Vite servido por Nginx na porta 80, mapeada para PORT_WEB.
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # URL da API injetada no build do Vite (browser acessa pelo host).
        VITE_API_URL: "http://localhost:${PORT_API:-3001}"
        VITE_LOOKER_EMBED_URL: "${VITE_LOOKER_EMBED_URL}"
    ports:
      - "${PORT_WEB:-3000}:80"
    # Garante que a API seja iniciada antes do frontend.
    depends_on:
      api:
        condition: service_started

volumes:
  ollama_data:
